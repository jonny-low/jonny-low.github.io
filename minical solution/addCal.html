<!DOCTYPE html>
<html>
	<head>
        <title>Monash Academic Calendar</title>
        <link rel="stylesheet" href='https://cdn.rawgit.com/kybarg/mdl-selectfield/mdl-menu-implementation/mdl-selectfield.min.css'>
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
        <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
        <link rel="stylesheet" href="css/style.css">
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="shortcut icon" sizes="144x144" href="img/minical.png" />
        <link rel="apple-touch-icon-precomposed" href="img/minical.png" />
	</head>
	<body>
        <!-- Always shows a header, even in smaller screens. -->
        <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
            <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <img src="img/monash.png" height="40px" width="55px">
                <!-- Title -->
                <span class="mdl-layout-title"> Add Calendar</span>
            </div>
            </header>
            <div class="mdl-layout__drawer">
                <span class="mdl-layout-title">Menu</span>
                <nav class="mdl-navigation">
                  <a class="mdl-navigation__link" href="index.html">Home</a>
                </nav>
              </div>
            <main class="mdl-layout__content">
            <div class="page-content">
                <div class="mdl-grid">
                    <div class="mdl-cell mdl-cell--4-col mdl-cell--6-col-tablet">
                    <!-- Grid1  content goes here -->
                        <h5>Calendar Type</h5>
                        <div class="mdl-selectfield mdl-js-selectfield">
                          <select class="mdl-selectfield__select" id="calType" name="calType">
                            <option value=""></option>
                            <option value="Event">Event</option>
                            <option value="Appointment">Appointment</option>
                            <option value="Reminder">Reminder</option>
                          </select>
                        </div>
                        <h5>Title</h5>
                        <div class="mdl-textfield mdl-js-textfield">
                          <input class="mdl-textfield__input" type="text" id="addTitle">
                        </div>
                        <h5>Start Date</h5>
                        <div class="mdl-textfield mdl-js-textfield">
                          <input class="mdl-textfield__input" type="date" id="startDate">
                        </div>
                        <h5>End Date</h5>
                        <div class="mdl-textfield mdl-js-textfield">
                          <input class="mdl-textfield__input" type="date" id="endDate">
                        </div>
                        <h5>Time</h5>
                        <div class="mdl-textfield mdl-js-textfield">
                            <input class="mdl-textfield__input" type="time" id="time">
                          </div>
                    </div>
                    <div class="mdl-cell mdl-cell--4-col mdl-cell--6-col-tablet">
                    <!-- Grid2  content goes here -->
                        <h5>Description</h5>
                        <div class="mdl-textfield mdl-js-textfield">
                            <textarea class="mdl-textfield__input" type="text" rows="10" id="description"></textarea>
                        </div>
                        <div>
                            <button class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored" onclick="saveCalendar()">
                        Save
                        </button>
                          <button class="mdl-button mdl-js-button mdl-button--raised mdl-button--colored" onclick="clearCalendar()">
                      Clear
                      </button>
                        </div>
                    </div>
                  </div>
                

            </div>
            </main>
        </div>
        <script src="js/shared.js"></script>
        <script src="js/addCal.js"></script>
	</body>
</html>
